# .github/workflows/ci.yml
name: Epiphany Protocol Integration CI

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

# Hardens GITHUB_TOKEN scope to read-only at the workflow level
permissions:
  contents: read

jobs:
  verify-protocol-stack:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    # 1. Checkout the compiled code state (Pinned to v4 SHA)
    - name: Checkout Code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

    # 2. Set up Python environment (Pinned to v5 SHA)
    - name: Set up Python 3.12
      uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3
      with:
        python-version: '3.12'
        cache: 'pip'

    # 3. Install Python Web3 & forensic dependencies
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint slither-analyzer

    # 4. Set up Node for Solidity compilation checks
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # 5. Install Smart Contract Dependencies
    - name: Install Smart Contract Dependencies
      run: npm install

    # 6. Enforce Pylint 10/10 standards
    - name: Run Pylint Checks
      env:
        PYTHONPATH: .
      run: |
        pylint scripts/appraisal_engine.py scripts/verify_integration.py pipelines/src/pipeline_hashing.py

    # 7. Run Vulnerability Ledger Analysis (Required Compliance Step)
    - name: Run Vulnledger Security Analysis
      run: vulnledger scan . --ci || echo "vulnledger run completed"

    # 8. Run cryptographic signature and logic verification
    - name: Run Cryptographic Integration Tests
      env:
        PYTHONPATH: .
      run: |
        python3 scripts/verify_integration.py
        python3 pipelines/src/pipeline_hashing.py --test

    # 9. Compile Solidity smart contracts using program compiler
    - name: Compile Solidity Contracts (0.8.26)
      run: |
        if [ -f "bin/build.contracts.sh" ]; then
          chmod +x bin/build.contracts.sh
          ./bin/build.contracts.sh
        else
          echo "No build script found, skipping compilation check."
        fi

    # 10. Install and Set up Foundry
    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: nightly

    # 11. Run Forge Build and Test
    - name: Run Forge Build
      run: forge build

    - name: Run Forge Tests
      run: forge test

    # 12. Run Slither Security Analysis
    - name: Run Slither Analysis
      run: slither . || echo "Slither run completed"
