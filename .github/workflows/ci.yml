# .github/workflows/ci.yml
name: Epiphany Protocol Integration CI

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

# Hardens GITHUB_TOKEN scope to read-only (Fixes actions/missing-workflow-permissions)
permissions:
  contents: read

jobs:
  verify-protocol-stack:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    # 1. Checkout the compiled code state
    - name: Checkout Code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

    # 2. Set up Python environment
    - name: Set up Python 3.12
      uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3
      with:
        python-version: '3.12'
        cache: 'pip'

    # 3. Install Python Web3 & forensic dependencies
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint

    # 4. Set up Node for Solidity compilation checks
    - name: Set up Node.js
      uses: actions/setup-node@601291242487c7819299021d00d164f63a99c168
      with:
        node-version: '20.x'
        cache: 'npm'

    # 5. Install Smart Contract Dependencies
    - name: Install Smart Contract Dependencies
      run: npm install

    # 5.5. Run Vulnledger Security Scan
    - name: Vulnerability Scan
      run: vulnledger scan . --ci

    # 6. Enforce Pylint 10/10 standards
    - name: Run Pylint Checks
      env:
        PYTHONPATH: .
      run: |
        pylint scripts/ pipelines/

    # 7. Run cryptographic signature and logic verification
    # Note: Requires node_modules for OpenZeppelin remappings during on-the-fly compilation
    - name: Run Cryptographic Integration Tests
      env:
        PYTHONPATH: .
      run: |
        python3 scripts/verify_integration.py
        python3 pipelines/src/pipeline_hashing.py --test

    # 8. Compile Solidity smart contracts
    # Note: Using bin/build.contracts.sh as the standard entry point
    - name: Compile Solidity Contracts (0.8.26)
      run: |
        if [ -f "bin/build.contracts.sh" ]; then
          chmod +x bin/build.contracts.sh
          ./bin/build.contracts.sh
        else
          echo "No build script found, skipping compilation check."
        fi
