# .github/workflows/ci.yml
name: Epiphany Protocol Integration CI

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

# Hardens GITHUB_TOKEN scope to read-only at the workflow level
permissions:
  contents: read

jobs:
  verify-protocol-stack:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the compiled code state (Pinned to v4 SHA)
    - name: Checkout Code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    # 2. Set up Python environment (Pinned to v5 SHA)
    - name: Set up Python 3.12
      uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
      with:
        python-version: '3.12'
        cache: 'pip'

    # 3. Install Python Web3 & forensic dependencies
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint

    # 4. Enforce Pylint 10/10 standards
    - name: Run Pylint Checks
      env:
        PYTHONPATH: .
      run: |
        pylint scripts/appraisal_engine.py scripts/verify_integration.py pipelines/src/pipeline_hashing.py

    # 5. Run cryptographic signature and logic verification
    - name: Run Cryptographic Integration Tests
      env:
        PYTHONPATH: .
      run: |
        python3 scripts/verify_integration.py
        python3 pipelines/src/pipeline_hashing.py --test

    # 6. Set up Node for Solidity compilation checks (Pinned to v4 SHA)
    - name: Set up Node.js
      uses: actions/setup-node@1d43b558a283531116e077b9491d951390317e0b # v4.2.0
      with:
        node-version: '20.x'
        cache: 'npm'

    # 7. Compile Solidity smart contracts
    - name: Install Smart Contract Dependencies
      run: npm install

    # Note: Using bin/build.contracts.sh as the standard entry point
    - name: Compile Solidity Contracts (0.8.26)
      run: |
        if [ -f "bin/build.contracts.sh" ]; then
          chmod +x bin/build.contracts.sh
          ./bin/build.contracts.sh
        else
          echo "No build script found, skipping compilation check."
        fi
