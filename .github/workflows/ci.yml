# .github/workflows/ci.yml
name: Epiphany Protocol Integration CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  verify-protocol-stack:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout codebase using pinned commit SHA (v4.2.2)
    - name: Checkout Code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

    # 2. Set up Python environment using pinned commit SHA (v5.1.0)
    - name: Set up Python 3.12
      uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint vulnledger

    - name: Run Pylint Checks
      run: |
        pylint scripts/appraisal_engine.py scripts/verify_integration.py pipelines/src/pipeline_hashing.py scripts/generate_trust_report.py

    # 3. Secure CVE Invariant Scanning (Resolves AKUMA-creator-ng Security Finding)
    - name: Run Vulnerability Scan
      run: |
        vulnledger scan . --ci

    - name: Run Cryptographic Integration Tests
      run: |
        python3 scripts/verify_integration.py
        python3 pipelines/src/pipeline_hashing.py --test

    # 4. Set up Node using pinned commit SHA (v4.0.3)
    - name: Set up Node.js
      uses: actions/setup-node@601291242487c7819299021d00d164f63a99c168
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install Node Dependencies
      run: npm install

    - name: Compile Solidity Contracts
      run: |
        if [ ! -f bin/build.contracts.sh ]; then
          echo "Error: bin/build.contracts.sh not found!"
          exit 1
        fi
        /bin/bash bin/build.contracts.sh
