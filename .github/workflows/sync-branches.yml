# .github/workflows/sync-branches.yml
name: Automated Branch Synchronization

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual and agentic CLI triggering

# Restrict write permissions strictly to this isolated execution runner
permissions:
  contents: write

jobs:
  sync-branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Checkout codebase using pinned commit SHA (v4.2.2)
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      # 2. Configure Git identity dynamically to exclude hardcoded PII/emails
      - name: Configure Git Identity
        run: |
          USER_NAME="${{ github.actor }}"
          USER_EMAIL="${{ github.actor_id }}+${{ github.actor }}@users.noreply."
          git config --global user.name "$USER_NAME"
          git config --global user.email "${USER_EMAIL}github.com"

      # 3. Synchronize staging branches using auditable, inline git merge routines
      - name: Sync feat/data-asset-registry
        run: |
          git checkout feat/data-asset-registry || git checkout -b feat/data-asset-registry origin/feat/data-asset-registry
          git merge origin/main --no-edit --allow-unrelated-histories
          git push origin feat/data-asset-registry

      - name: Sync feat/protocol-final-consolidation
        run: |
          git checkout feat/protocol-final-consolidation || git checkout -b feat/protocol-final-consolidation origin/feat/protocol-final-consolidation
          git merge origin/main --no-edit --allow-unrelated-histories
          git push origin feat/protocol-final-consolidation
