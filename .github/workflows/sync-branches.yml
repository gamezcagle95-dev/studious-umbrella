# .github/workflows/sync-branches.yml
name: Automated Branch Synchronization

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual and agentic CLI triggering

jobs:
  sync-branches:
    runs-on: ubuntu-latest

    # Securely scopes write permissions to this specific execution job only
    permissions:
      contents: write

    steps:
      # 1. Checkout codebase using pinned commit SHA (v4.2.2)
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # 2. Synchronize feat/data-asset-registry
      - name: Sync main into feat/data-asset-registry
        run: |
          git fetch origin
          git checkout feat/data-asset-registry
          git merge origin/main --no-edit
          git push origin feat/data-asset-registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. Synchronize feat/protocol-final-consolidation
      - name: Sync main into feat/protocol-final-consolidation
        run: |
          git fetch origin
          git checkout feat/protocol-final-consolidation
          git merge origin/main --no-edit
          git push origin feat/protocol-final-consolidation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
