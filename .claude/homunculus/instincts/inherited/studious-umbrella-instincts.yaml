# Studious Umbrella Workflow Smart Contract Integration And Linkage

## Action

Follow the smart-contract-integration-and-linkage workflow:
1. Modify src/contracts/ProvenanceLedger.sol and/or src/contracts/ProvenanceRegistry.sol to add or remove integration logic.
2. Update deploy.py to reflect new linkage or remove linkage logic.
